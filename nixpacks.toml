[phases.setup]
nixPkgs = [
  "python311Full",
  "nodejs_20",
  "gcc",
  "stdenv.cc.cc.lib",
  "zlib",
  "glib",
  "nss",
  "nspr",
  "dbus",
  "atk",
  "at-spi2-atk",
  "at-spi2-core",
  "cups",
  "libdrm",
  "mesa",
  "libxkbcommon",
  "alsa-lib",
  "pango",
  "cairo",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "expat",
  "fontconfig",
  "freetype",
]

[phases.install]
cmds = [
  "python3 -m venv --copies /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "cd backend && /opt/venv/bin/pip install -r requirements.txt",
  \"mkdir -p /opt/scholarhive-libs && (find /nix/store -name 'libstdc++.so.6' 2>/dev/null | head -1 | xargs -I{} cp {} /opt/scholarhive-libs/ || true) && (find /nix/store -name 'libgcc_s.so.1' 2>/dev/null | head -1 | xargs -I{} cp {} /opt/scholarhive-libs/ || true) && (find /nix/store -name 'libglib-2.0.so.0' 2>/dev/null | head -1 | xargs -I{} cp {} /opt/scholarhive-libs/ || true) && (find /nix/store -name 'libdbus-1.so.3' 2>/dev/null | head -1 | xargs -I{} cp {} /opt/scholarhive-libs/ || true) && (find /nix/store -name 'libdrm.so.2' 2>/dev/null | head -1 | xargs -I{} cp {} /opt/scholarhive-libs/ || true) && (ls -la /opt/scholarhive-libs || true)\",
  "cd backend && PLAYWRIGHT_BROWSERS_PATH=/opt/playwright-browsers /opt/venv/bin/python -m playwright install chromium",
  "cd frontend && npm ci && npm run build"
]

[start]
cmd = "export LD_LIBRARY_PATH=/opt/scholarhive-libs:$LD_LIBRARY_PATH && cd backend && /opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT"
