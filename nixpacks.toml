# Production deploys use the root Dockerfile (Playwright noble image) via railway.json.
# Minimal fallback only if Nixpacks is used locally — no Playwright browser install here.

[phases.setup]
nixPkgs = ["python311Full", "nodejs_20"]

[phases.install]
cmds = [
  "python3 -m venv --copies /opt/venv",
  "/opt/venv/bin/pip install --upgrade pip",
  "cd backend && /opt/venv/bin/pip install -r requirements.txt",
  "cd frontend && npm ci && npm run build",
]

[start]
cmd = "cd backend && /opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $PORT"
